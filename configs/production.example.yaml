listenAddr: "0.0.0.0:8080"
publicBaseUrl: "https://host.example.com"
baseDomain: "sites.example.com"
dataDir: "/var/lib/go-go-host"
controlDbDsn: "postgres://go_go_host:REPLACE_ME@postgres.example.com:5432/go_go_host?sslmode=require"
oidcIssuer: "https://issuer.example.com/"
oidcClientId: "go-go-host"
oidcScopes: ["openid", "profile", "email"]
oidcRedirectPath: "/app/auth/callback"
oidcLogoutRedirectPath: "/app"
devAuth: false
devPlatformAdminSubjects: []
platformAdminOIDCSubjects:
  - "REPLACE_WITH_FIRST_ADMIN_SUBJECT"
platformAdminEmails:
  - "admin@example.com"
platformAdminOIDCRoles:
  - "go-go-host-admin"
logLevel: "info"
readTimeout: 15s
writeTimeout: 30s
shutdownTimeout: 15s
